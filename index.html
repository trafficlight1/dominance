<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/svg+xml" href="./data/LOGO_WHITE.svg">
<title>Морфологія Львова</title>
<style>
@font-face {
  font-family: 'EuclidFlex';
  src: url('./fonts/EuclidFlex-Bold.ttf') format('truetype');
  font-weight: 700;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e28;
    --border: #252a38;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --accent: #8B0000;
    --panel-w: 272px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Onest', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* HEADER — floats over the map so glass effect is visible */
  header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 24px;
    height: 68px;
    background: rgba(5, 6, 10, 0.45);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
  }
  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  header h1 span { color: var(--accent); }

  .header-left {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .header-center {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .header-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 4px;
  }

  .header-tabs { display: flex; gap: 4px; }
  .tab-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    padding: 5px 14px;
    border-radius: 6px;
    font-family: 'Onest', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--border); }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .menu-btn {
    display: none;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    backdrop-filter: blur(8px);
    transition: background 0.15s;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.1); }

  /* SANDWICH DROPDOWN */
  .sandwich-dropdown {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: fixed;
    top: 68px;
    right: 0;
    left: 0;
    background: rgba(8, 9, 14, 0.92);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 999;
    padding: 10px 16px 14px;
    /* Default: hidden above header */
    opacity: 0;
    pointer-events: none;
    transform: translateY(-100%);
    transition: opacity 0.25s ease, transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }
 
  .sandwich-nav-item {
    padding: 10px 14px;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .sandwich-nav-item:hover { background: rgba(255,255,255,0.06); color: var(--text); border-color: rgba(255,255,255,0.08); }

  /* MAIN — fills entire viewport, header floats above */
  .main { position: fixed; inset: 0; display: flex; }

  /* MAP */
  #map { flex: 1; background: var(--bg); }
  .sidebar {
    position: absolute;
    top: calc(68px + 16px);
    left: 16px;
    width: 256px;
    max-height: calc(100% - 68px - 32px);
    background: rgba(18, 21, 30, 0.97);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: transform 0.25s ease, opacity 0.25s ease;
    z-index: 900;
  }
  .sidebar-inner {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .section-title:first-child { margin-top: 0; }

  /* LAYER TOGGLES */
  .layer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 3px;
    user-select: none;
  }
  .layer-row:hover { background: var(--surface2); }
  .toggle {
    width: 30px; height: 16px;
    background: var(--border);
    border-radius: 8px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(14px); }
  .layer-label { font-size: 13px; flex: 1; }
  .layer-count { font-size: 10px; color: var(--text-muted); }

  /* LEGEND */
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 11px;
    color: var(--text-muted);
  }
  .legend-line { width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .legend-grad {
    width: 100%; height: 12px;
    border-radius: 4px;
    background: linear-gradient(to right, #f5f0e8, #444444);
    margin: 6px 0 3px;
  }
  .legend-grad-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* LOADING */
  .loading-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 11px;
    color: var(--text-muted);
  }
  .spinner {
    width: 11px; height: 11px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dot-ok  { width: 7px; height: 7px; background: #34d399; border-radius: 50%; flex-shrink: 0; }
  .dot-err { width: 7px; height: 7px; background: #f87171; border-radius: 50%; flex-shrink: 0; }

  /* INFO PANEL */
  .info-panel {
    position: absolute;
    bottom: 20px; right: 20px;
    width: 280px;
    max-height: calc(100vh - 120px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    z-index: 800;
    font-size: 12px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .info-panel.visible { display: block; }
  .info-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .info-title button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: var(--text-muted); white-space: nowrap; }
  .info-val { color: var(--text); font-weight: 500; text-align: right; word-break: break-word; }

  /* MAP */
  #map { flex: 1; background: var(--bg); }
  .leaflet-container { background: #000000 !important; }
  .leaflet-control-zoom {
    border: 1px solid rgba(255,255,255,0.10) !important;
    border-radius: 10px !important;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
  }
  .leaflet-control-zoom a {
    background: rgba(13,15,20,0.70) !important;
    backdrop-filter: blur(12px) !important;
    -webkit-backdrop-filter: blur(12px) !important;
    color: var(--text) !important;
    border-color: rgba(255,255,255,0.08) !important;
    width: 32px !important; height: 32px !important; line-height: 32px !important;
    font-size: 16px !important;
  }
  .leaflet-control-zoom a:hover { background: rgba(30,33,45,0.85) !important; }
  .leaflet-control-attribution { display: none !important; }
  .leaflet-bottom.leaflet-left { bottom: 20px; left: 20px; }

  /* STATS */
  .stats-bar {
    position: absolute;
    top: calc(68px + 12px); left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px;
    z-index: 700; pointer-events: none;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 11px;
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap;
  }
  .stat-chip strong { color: var(--text); font-weight: 500; }

  /* MOBILE */

  @media (max-width: 680px) {
    :root { --panel-w: 285px; }
    header { padding: 0 14px; height: 56px; }
    .header-tabs { display: none; }
    .menu-btn { display: flex; }
    #map { margin-left: 0; }

    /* On mobile: sandwich dropdown shows nav text */
    .header-left .header-nav-text { display: none; }

    .sidebar {
      top: 0;
      left: 0;
      width: 280px;
      max-height: 100%;
      height: 100%;
      border-radius: 0 16px 16px 0;
      transform: translateX(-105%);
      box-shadow: 8px 0 40px rgba(0,0,0,0.6);
      position: fixed;
    }
    .sidebar.open { transform: translateX(0); }
    .overlay.open { display: block; }
    .mobile-tabs { display: flex; padding: 12px 14px 0; gap: 5px; }
    .mobile-tab {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 4px;
      border-radius: 7px;
      font-family: 'Onest', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mobile-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .info-panel { width: calc(100vw - 28px); right: 14px; bottom: 14px; max-height: 50vh; }
    .stats-bar { top: 8px; gap: 4px; }
    .stat-chip { font-size: 10px; padding: 3px 8px; }
    .header-logo-img { width: 34px; height: 34px; }
    .header-logo-text { font-size: 11px; }
    .sandwich-dropdown { top: 56px; }
    header { position: fixed; height: 56px; padding: 0 14px; }
  }
  @media (min-width: 681px) { .mobile-tabs { display: none; } }

  /* ── STREET SEARCH ─────────────────────────────────────────── */
  .search-wrap {
    position: absolute;
    top: calc(68px + 12px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 890;
    width: min(360px, calc(100vw - 32px));
  }
  /* When sidebar is open on mobile — push search behind overlay */
  body.sidebar-open .search-wrap { z-index: 840; pointer-events: none; }
  .search-box {
    display: flex;
    align-items: center;
    background: rgba(13,15,20,0.75);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 0 12px;
    gap: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    transition: border-color 0.15s;
  }
 /* .search-box:focus-within {
    border-color: var(--accent);
  }*/
  .search-icon {
    color: var(--text-muted);
    font-size: 14px;
    flex-shrink: 0;
  }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 13px;
    padding: 10px 0;
    min-width: 0;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-clear {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    display: none;
    transition: color 0.12s;
  }
  .search-clear:hover { color: var(--text); }
  .search-clear.visible { display: block; }
  .search-dropdown {
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.10);
    border-top: none;
    border-radius: 0 0 10px 10px;
    max-height: 260px;
    overflow-y: auto;
    display: none;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .search-dropdown.open { display: block; }
  .search-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.1s;
    font-size: 12px;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover, .search-item.active { background: rgba(139,0,0,0.18); }
  .search-item-icon { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }
  .search-item-name { color: var(--text); flex: 1; }
  .search-item-count { color: var(--text-muted); font-size: 10px; }
  .search-no-results {
    padding: 14px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }
  /* When sidebar menu is open — bring sidebar above everything, disable search */
  body.sidebar-open .sidebar { z-index: 960; }
  body.sidebar-open .search-wrap { z-index: 840; pointer-events: none; }

  @media (max-width: 680px) {
    .search-wrap { top: calc(56px + 8px); width: calc(100vw - 24px); }
  }

  /* Hide search bar when sandwich dropdown is open */
  .search-wrap {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
  }
  .search-wrap.dropdown-hidden {
    transform: translateX(-50%) translateY(-100px);
    opacity: 0;
    pointer-events: none;
  }

  @media (max-width: 680px) {
    .search-wrap.dropdown-hidden {
      transform: translateX(-50%) translateY(-80px);
      opacity: 0;
      pointer-events: none;
    }
  }

  /* Badge rows inside info panel */
  .info-badge {
    display: inline-flex;
    align-items: center;
    background: rgba(139,0,0,0.18);
    border: 1px solid rgba(139,0,0,0.35);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 11px;
    color: #fca5a5;
    font-weight: 500;
  }
  .info-badge.green {
    background: rgba(52,211,153,0.12);
    border-color: rgba(52,211,153,0.3);
    color: #6ee7b7;
  }
  .info-badge.gray {
    background: rgba(100,100,120,0.18);
    border-color: rgba(100,100,120,0.3);
    color: var(--text-muted);
  }
  #splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0s;
  }
  #splash.fading {
    transition: opacity 1.5s ease;
    opacity: 0;
  }
  .splash-logo {
    width: 140px;
    height: 140px;
    object-fit: contain;
  }
  #splashBar {
    position: absolute;
    bottom: 50px;
    left: 0;
    height: 3px;
    width: 0%;
    background: linear-gradient(to right, #6b0000, #8B0000, #c0392b);
    box-shadow: 0 0 10px rgba(200,0,0,0.8);
    transition: width 0.4s ease;
  }

  /* ── GLASS PANELS ──────────────────────────────────────────── */
  .info-panel {
    background: rgba(13,15,20,0.62) !important;
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08) !important;
    overflow-y: auto;
  }
  .stat-chip {
    background: rgba(13,15,20,0.55) !important;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.07) !important;
  }

  /* ── HEADER LOGO ──────────────────────────────────────────── */
  .header-logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo-img {
    width: 45px;
    height: 45px;
    object-fit: contain;
    flex-shrink: 0;
    border-radius: 6px;
  }
  @media (max-width: 680px) {
    .header-logo-img { width: 32px; height: 32px; }
  }
  .header-logo-text {
    font-family: 'EuclidFlex', 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
  }
  .header-logo-text span { color: var(--accent); }
  .splash-btn svg { flex-shrink: 0; }
</style>
</head>
<body>

<!-- ── SPLASH SCREEN ─────────────────────────────────────────── -->
<div id="splash">
  <img class="splash-logo" src="./data/LOGO_WHITE.svg" alt="Логотип" />
  <div style="position:absolute;bottom:50px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 24px;">
    <span id="splashLabel" style="font-family:'Onest',sans-serif;font-size:10px;letter-spacing:0.14em;color:rgba(255,255,255,0.35);text-align:center;">Завантаження…</span>
    <div style="width:min(160px,40vw);height:1px;background:rgba(255,255,255,0.12);position:relative;overflow:hidden;">
      <div id="splashBar" style="position:absolute;top:0;left:0;height:100%;width:0%;background:#fff;transition:width 0.4s ease;"></div>
    </div>
  </div>
</div>
<!-- ─────────────────────────────────────────────────────────── -->

<header>
  <!-- Left: nav text (hidden on mobile, shown in dropdown) -->
  <div class="header-left">
    <div class="header-tabs">
      <span style="font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);padding:0 4px;">МОРФОЛОГІЧНИЙ АНАЛІЗ</span>
    </div>
  </div>

  <!-- Center: logo -->
  <div class="header-center">
    <a href="https://pidsvitu.com/" class="header-logo-link">
      <img class="header-logo-img" src="./data/LOGO_WHITE.svg" alt="LOGO" />
    </a>
  </div>

  <!-- Right: hamburger on mobile -->
  <div class="header-right">
    <button class="menu-btn" id="menuBtn">☰</button>
  </div>
</header>

<div class="overlay" id="overlay"></div>

<!-- ── SANDWICH DROPDOWN ─────────────────────────────────────── -->
<div class="sandwich-dropdown" id="sandwichDropdown">

</div>

<!-- ── STREET SEARCH ─────────────────────────────────────────── -->
<div class="search-wrap" id="searchWrap">
  <div class="search-box">
    <span class="search-icon"></span>
    <input class="search-input" id="searchInput" type="text" placeholder="Пошук вулиці" autocomplete="off" />
    <button class="search-clear" id="searchClear">✕</button>
  </div>
  <div class="search-dropdown" id="searchDropdown"></div>
</div>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="mobile-tabs">
      <button class="mobile-tab active" data-layer="all">Всі</button>
    </div>
    <div class="sidebar-inner">

      <p class="section-title">Шари</p>
      <div class="layer-row" id="rowStreets">
        <span class="toggle on" id="togStreets"></span>
        <span class="layer-label">Вулиці</span>
        <span class="layer-count" id="cntStreets"></span>
      </div>
      <div class="layer-row" id="rowBuildings">
        <span class="toggle on" id="togBuildings"></span>
        <span class="layer-label">Будинки</span>
        <span class="layer-count" id="cntBuildings"></span>
      </div>
      <div class="layer-row" id="rowParks">
        <span class="toggle on" id="togParks"></span>
        <span class="layer-label">Парки</span>
        <span class="layer-count" id="cntParks"></span>

// EPSG:3857 (Web Mercator metres) → [lat, lng]
function merc2ll(x, y) {
  const lng = x / 20037508.342 * 180;
  const lat = Math.atan(Math.exp(y / 20037508.342 * Math.PI)) * 360 / Math.PI - 90;
  return [lat, lng];
}
// Detect if coordinates are in metres (|x| > 180 means it's projected)
function coordsToLatLng(coords) {
  return coords.map(c => Math.abs(c[0]) > 180 ? merc2ll(c[0], c[1]) : [c[1], c[0]]);
}
// METERS → PIXELS
function m2px(m) {
  const mpp = 156543.03392 * Math.cos(map.getCenter().lat * Math.PI / 180) / Math.pow(2, map.getZoom());
  return m / mpp;
}


let streetLayersRef = [];
let streetTypesFound = new Set();
// Street search index: { name, bounds, segments[] }
let streetSearchIndex = {};

// Labels for all COLUMNS_TO_KEEP fields

function formatFieldValue(key, val) {
  if (val === null || val === undefined || val === '' || val === 'None') return '<span class="info-badge gray">Ні</span>';
  if (key === 'is_tram') {
    const v = String(val).toLowerCase();

    if (v === 'false' || v === '0' || v === 'no') return '<span class="info-badge gray">Ні</span>';
  }
  if (key === 'bicycle') {
    const v = String(val).toLowerCase();
    if (v === 'yes' || v === 'designated') return `<span class="info-badge green">Так</span>`;
    if (v === 'no') return `<span class="info-badge gray">НІ</span>`;
  }
  if (key === 'maxspeed') return `${val} км/год`;
  if (key === 'seg_len_m') return `${parseFloat(val).toFixed(1)} м`;
  if (key === 'street_width_m') return `${parseFloat(val).toFixed(1)} м`;
  return String(val);
}

function resolveStreetColor(p) {
  // Primary: lighting_pattern_name is the morphological type
  const name = p.lighting_pattern_name;
  if (name && STREET_COLORS[name]) return { color: STREET_COLORS[name], typeKey: name };
  // Fallback: OSM highway tag
  const hw = p.highway || p.type || 'default';
  return { color: HIGHWAY_COLORS[hw] || '#6b7280', typeKey: hw };
}

function renderStreets(data) {
  layers.streets.group.clearLayers();
  streetLayersRef = []; streetTypesFound = new Set();
  streetSearchIndex = {};
  const pw = m2px(1);
  (data.features || []).forEach(feat => {
    if (!feat.geometry) return;
    const p = feat.properties || {};
    const { color, typeKey } = resolveStreetColor(p);
    const hw = typeKey;
    const widthM = Math.min(40, Math.max(1, parseFloat(p.street_width_m) || parseFloat(p.width) || 6));
    streetTypesFound.add(hw);
    const rawCoords = feat.geometry.type === 'LineString' ? [feat.geometry.coordinates]
      : feat.geometry.type === 'MultiLineString' ? feat.geometry.coordinates : null;
    if (!rawCoords) return;
    rawCoords.forEach(coords => {
      const weight = Math.max(1, widthM * pw);
      const latlngs = coordsToLatLng(coords);
      const line = L.polyline(latlngs, {
        color, weight, opacity: 0.82, lineCap: 'round', lineJoin: 'round'
      });
      line.on('click', e => {
        L.DomEvent.stopPropagation(e);
        showStreetInfo(p);
      });
      layers.streets.group.addLayer(line);
      streetLayersRef.push({ line, widthM, typeKey: hw });

      // Build search index by name:uk
      const streetName = p['name:uk'];
      if (streetName) {
        const key = streetName.toLowerCase();
        if (!streetSearchIndex[streetName]) {
          streetSearchIndex[streetName] = { name: streetName, latlngs: [] };
        }
        streetSearchIndex[streetName].latlngs.push(...latlngs);
      }
    });
  });
  renderStreetLegend();
  document.getElementById('cntStreets').textContent = (data.features||[]).length.toLocaleString('uk');
  updateStats();
  initStreetSearch();
}

  STREET_GROUPS.forEach(group => {
    const foundPatterns = group.patterns.filter(p => counts[p]);
    if (!foundPatterns.length) return;
    const groupTotal = foundPatterns.reduce((s, p) => s + (counts[p] || 0), 0);
    el.innerHTML += `
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0 3px;margin-top:4px">
        <div style="width:10px;height:10px;border-radius:50%;background:${group.color};flex-shrink:0"></div>

        <span style="font-size:10px;color:var(--text-muted)">${groupTotal.toLocaleString('uk')}</span>
      </div>`;
    foundPatterns.forEach(pat => {
      const color = STREET_COLORS[pat] || group.color;
      el.innerHTML += `
        <div style="display:flex;align-items:center;gap:8px;padding:2px 0 2px 18px">

  Object.keys(counts).forEach(key => {

      el.innerHTML += `<div style="display:flex;align-items:center;gap:8px;padding:2px 0">
        <div style="width:18px;height:3px;border-radius:2px;background:${color};flex-shrink:0"></div>
        <span style="font-size:11px;color:var(--text-muted);flex:1">${key}</span>

    }
  });
}

// Reproject a GeoJSON feature's coordinates from EPSG:3857 to WGS84 in-place (deep clone)
function reprojectFeature(feat) {
  if (!feat || !feat.geometry) return feat;
  const f = JSON.parse(JSON.stringify(feat));
  function reproj(coords) {
    if (!Array.isArray(coords)) return coords;
    if (typeof coords[0] === 'number') {
      if (Math.abs(coords[0]) > 180) {
        const ll = merc2ll(coords[0], coords[1]);
        return [ll[1], ll[0]]; // GeoJSON wants [lng, lat]
      }
      return coords;
    }
    return coords.map(reproj);
  }
  f.geometry.coordinates = reproj(f.geometry.coordinates);
  return f;
}

function renderBuildingEpochLegend() {
  const el = document.getElementById('buildingEpochLegend');
  if (!el) return;
  el.innerHTML = BUILDING_EPOCHS.map(e => `
    <div style="display:flex;align-items:center;gap:8px;padding:3px 0">
      <div style="width:14px;height:14px;border-radius:3px;background:${e.color};flex-shrink:0;opacity:0.9"></div>
      <span style="font-size:11px;color:var(--text-muted);line-height:1.3">${e.label}</span>
    </div>`).join('');
}
renderBuildingEpochLegend();

function yearToColor(y) {
  if (!y || isNaN(y)) return BUILDING_COLOR_UNKNOWN;
  const epoch = BUILDING_EPOCHS.find(e => y <= e.until);
  return epoch ? epoch.color : BUILDING_COLOR_UNKNOWN;
}
function renderBuildings(data) {
  layers.buildings.group.clearLayers();
  renderBuildingEpochLegend();
  let minY = Infinity, maxY = -Infinity;
  (data.features || []).forEach(feat => {
    if (!feat.geometry) return;
    const p = feat.properties || {};
    const year = parseInt(p.test) || parseInt(p.start_date) || parseInt(p.construction_year)
      || parseInt(p['building:start_date']) || null;
    if (year) { if (year < minY) minY = year; if (year > maxY) maxY = year; }
    L.geoJSON(reprojectFeature(feat), { style: { color: 'rgba(100,100,100,0.2)', weight: 0.5, fillColor: yearToColor(year), fillOpacity: 0.78 } })
      .on('click', e => { L.DomEvent.stopPropagation(e); showInfo('Будинок', {
        'Рік побудови': year || '—',
        'Тип': p.building || '—',
        'Поверхи': p['building:levels'] || p.building_levels || '—',
        'Вулиця': p['addr:street'] ? `${p['addr:street']} ${p['addr:housenumber']||''}` : '—',
      }); })
      .addTo(layers.buildings.group);
  });
  document.getElementById('cntBuildings').textContent = (data.features||[]).length.toLocaleString('uk');
  if (minY < Infinity) document.getElementById('buildingYearRange').textContent = `${minY} — ${maxY} рр.`;

}

function renderCrossings(data) {
  layers.crossings.group.clearLayers();
  (data.features||[]).forEach(feat => {
    if (!feat.geometry) return;
    const g = feat.geometry;
    if (g.type === 'Point') {
      const ll = Math.abs(g.coordinates[0]) > 180 ? merc2ll(g.coordinates[0], g.coordinates[1]) : [g.coordinates[1], g.coordinates[0]];
      L.circleMarker(ll, {
      radius: 4, color: '#F1EAD7', weight: 1, fillColor: '#F1EAD7', fillOpacity: 0.7
      }).addTo(layers.crossings.group);
    }
  });
  document.getElementById('cntCrossings').textContent = (data.features||[]).length.toLocaleString('uk');
}

// FOOTWAYS
function renderFootways(data) {
  layers.footways.group.clearLayers();
  (data.features||[]).forEach(feat => {
    if (!feat.geometry) return;
    const raw = feat.geometry.type === 'LineString' ? [feat.geometry.coordinates]

    if (!raw) return;

  });

}

  }, 1950);
}

function updateSplashProgress(loaded, total, label) {
  const pct = Math.round((loaded / total) * 100);
  document.getElementById('splashBar').style.width = pct + '%';
  const lbl = document.getElementById('splashLabel');
  if (lbl && label) lbl.textContent = label;
  if (loaded >= total && !splashLoadDone) {
    splashLoadDone = true;
    if (lbl) lbl.textContent = 'Готово';
    setTimeout(() => dismissSplash(), 100);
  }
}

const FILE_LABELS = {
  'streets':   'Вулична мережа…',
  'buildings': 'Будинки та епохи…',
  'parks':     'Парки та зони…',
  'crossings': 'Пішохідні переходи…',
  'footways':  'Тротуари…',
};

async function loadAll() {
  const total = FILES.length;
  let loaded = 0;
  await Promise.all(FILES.map(async ({ name, key, render }) => {
    try {
      updateSplashProgress(loaded, total, FILE_LABELS[key] || 'Завантаження…');
      const res = await fetch(name);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      render(data);
    } catch(e) {
      console.warn(`[lviv] failed to load ${name}:`, e);
    } finally {
      loaded++;
      updateSplashProgress(loaded, total, loaded < total ? FILE_LABELS[FILES[loaded]?.key] || '' : '');
    }
  }));
}
loadAll();

// ── STREET SEARCH ────────────────────────────────────────────────
let searchDebounceTimer = null;
let activeSearchIdx = -1;

function normStr(s) {
  return s.toLowerCase()
    .replace(/вулиця\s*/gi, '')
    .replace(/вул\.\s*/gi, '')
    .replace(/проспект\s*/gi, '')
    .replace(/пр\.\s*/gi, '')
    .replace(/провулок\s*/gi, '')
    .replace(/пров\.\s*/gi, '')
    .trim();
}

function localStreetSearch(query) {
  if (!query || query.length < 2) return [];
  const q = normStr(query);
  const results = [];
  Object.values(streetSearchIndex).forEach(entry => {
    const n = normStr(entry.name);
    if (n.includes(q)) {
      results.push(entry);
    }
  });
  // Sort: starts-with first
  results.sort((a, b) => {
    const an = normStr(a.name), bn = normStr(b.name);
    const aStarts = an.startsWith(q) ? 0 : 1;
    const bStarts = bn.startsWith(q) ? 0 : 1;
    return aStarts - bStarts || a.name.localeCompare(b.name, 'uk');
  });
  return results.slice(0, 10);
}

async function osmNominatimSearch(query) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', Львів')}&format=json&limit=5&addressdetails=1&accept-language=uk`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'uk' } });
    const data = await res.json();
    return data.filter(d => d.type === 'road' || d.type === 'residential' || d.class === 'highway' || d.type === 'pedestrian' || d.type === 'footway');
  } catch(e) { return []; }
}

function renderDropdown(localResults, query) {
  const dd = document.getElementById('searchDropdown');
  activeSearchIdx = -1;
  if (!query || query.length < 2) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

  let html = '';
  if (localResults.length === 0) {
    html = `<div class="search-no-results">Нічого не знайдено у даних. Спробуйте інший запит.</div>`;
  } else {
    localResults.forEach((entry, i) => {
      html += `<div class="search-item" data-street="${encodeURIComponent(entry.name)}" data-idx="${i}">
        <span class="search-item-icon">🛣</span>
        <span class="search-item-name">${highlightMatch(entry.name, query)}</span>
      </div>`;
    });
  }
  dd.innerHTML = html;
  dd.classList.add('open');

  // Click handlers
  dd.querySelectorAll('.search-item').forEach((el, i) => {
    el.addEventListener('click', () => {
      const name = decodeURIComponent(el.dataset.street);
      selectStreet(name);
    });
  });
}

function highlightMatch(name, query) {
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return name.replace(new RegExp(`(${q})`, 'gi'), '<strong style="color:var(--text)">$1</strong>');
}

function selectStreet(name) {
  const entry = streetSearchIndex[name];
  if (!entry || !entry.latlngs || !entry.latlngs.length) return;
  // Compute bounds of all segments for this street
  const bounds = L.latLngBounds(entry.latlngs);
  map.fitBounds(bounds, { padding: [60, 60], maxZoom: 17 });
  document.getElementById('searchInput').value = name;
  document.getElementById('searchClear').classList.add('visible');
  document.getElementById('searchDropdown').classList.remove('open');
  document.getElementById('searchDropdown').innerHTML = '';
}

function initStreetSearch() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  const dd = document.getElementById('searchDropdown');

  input.addEventListener('input', () => {
    const q = input.value.trim();
    clear.classList.toggle('visible', q.length > 0);
    clearTimeout(searchDebounceTimer);
    if (q.length < 2) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
    searchDebounceTimer = setTimeout(() => {
      const results = localStreetSearch(q);
      renderDropdown(results, q);
    }, 180);
  });

  input.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.search-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeSearchIdx = Math.min(activeSearchIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('active', i === activeSearchIdx));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeSearchIdx = Math.max(activeSearchIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle('active', i === activeSearchIdx));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeSearchIdx >= 0 && items[activeSearchIdx]) {
        const name = decodeURIComponent(items[activeSearchIdx].dataset.street);
        selectStreet(name);
      } else if (items.length === 1) {
        const name = decodeURIComponent(items[0].dataset.street);
        selectStreet(name);
      }
    } else if (e.key === 'Escape') {
      dd.classList.remove('open'); dd.innerHTML = '';
    }
  });

  clear.addEventListener('click', () => {
    input.value = '';
    clear.classList.remove('visible');
    dd.classList.remove('open'); dd.innerHTML = '';
    input.focus();
  });

  // Close dropdown on outside click
  document.addEventListener('click', e => {
    if (!document.getElementById('searchWrap').contains(e.target)) {
      dd.classList.remove('open');
    }
  });
}

// TAB SWITCHING
function setActiveLayer(layer) {
  const s = layer==='streets'||layer==='all';
  const b = layer==='buildings'||layer==='all';
  layers.streets.on = s; layers.buildings.on = b;
  Object.keys(layers).forEach(syncToggle);
  document.getElementById('streetLegendWrap').style.display   = s ? '' : 'none';
}
document.querySelectorAll('.tab-btn, .mobile-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const layer = btn.dataset.layer;
    document.querySelectorAll('[data-layer]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll(`[data-layer="${layer}"]`).forEach(b => b.classList.add('active'));
    setActiveLayer(layer);
  });
});
setActiveLayer('all');

// MOBILE MENU
function closeMobileMenu() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sandwichDropdown').classList.remove('open');
  document.body.classList.remove('sidebar-open');
  document.getElementById('searchWrap').classList.remove('dropdown-hidden');
  document.getElementById('menuBtn').textContent = '☰';
}

document.getElementById('menuBtn').addEventListener('click', () => {
  const isOpen = document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
  const dropdownOpen = document.getElementById('sandwichDropdown').classList.toggle('open');
  document.body.classList.toggle('sidebar-open', isOpen);
  // Hide search bar with upward animation only on mobile when dropdown is open
  if (isMobile()) {
    document.getElementById('searchWrap').classList.toggle('dropdown-hidden', dropdownOpen);
  }
  document.getElementById('menuBtn').textContent = dropdownOpen ? '✕' : '☰';
});
document.getElementById('overlay').addEventListener('click', closeMobileMenu);
